services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - camera-data:/tmp/camera
    devices:
      - /dev/bus/usb:/dev/bus/usb   # OAK-D camera USB passthrough (Linux)
    networks:
      - app-network
    restart: unless-stopped
    depends_on: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5000}:80"
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - backend

  # Phase 2 — uncomment when database layer is added
