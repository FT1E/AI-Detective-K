  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #     - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # Phase 3 — uncomment when blockchain layer is added
  # hardhat:
  #   build:
  #     context: ./blockchain
  #     dockerfile: Dockerfile
  #   ports:
  #     - "8545:8545"
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  camera-data:
